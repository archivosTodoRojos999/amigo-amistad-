<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#302b63">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Día del Amigo">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="https://base44.app/api/apps/6a5da972c767fff27b059883/files/mp/public/6a5da972c767fff27b059883/2cf349d90_icon-512.png">
<link rel="icon" type="image/png" href="https://base44.app/api/apps/6a5da972c767fff27b059883/files/mp/public/6a5da972c767fff27b059883/249564b3d_icon-192.png">
<title>Día del Amigo 🎉</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg-1: #0f0c29;
    --bg-2: #302b63;
    --bg-3: #24243e;
    --accent-1: #6c5ce7;
    --accent-2: #fd79a8;
    --accent-3: #00cec9;
    --accent-4: #fdcb6e;
    --text: #f5f3f7;
    --text-muted: #b0a8c0;
    --card-bg: rgba(255, 255, 255, 0.06);
    --card-border: rgba(255, 255, 255, 0.12);
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle { position: absolute; width: 6px; height: 6px; border-radius: 50%; opacity: 0.5; animation: floatUp linear infinite; }
  @keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.4; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  header { text-align: center; padding: 80px 20px 40px; position: relative; z-index: 1; }
  header h1 {
    font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 800;
    background: linear-gradient(90deg, var(--accent-2), var(--accent-3), var(--accent-4));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -1px; margin-bottom: 12px;
  }
  header p { font-size: clamp(1rem, 3vw, 1.3rem); color: var(--text-muted); font-weight: 300; max-width: 600px; margin: 0 auto; line-height: 1.6; }

  .gifts-section { max-width: 1000px; margin: 0 auto; padding: 20px 20px 60px; position: relative; z-index: 1; }
  .section-title { text-align: center; font-size: 1.5rem; font-weight: 600; margin-bottom: 30px; color: var(--text-muted); letter-spacing: 0.5px; }
  .gifts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
  .gift-btn {
    background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius);
    padding: 28px 18px; cursor: pointer; font-family: inherit; color: var(--text); font-size: 1rem; font-weight: 500;
    display: flex; flex-direction: column; align-items: center; gap: 12px; backdrop-filter: blur(10px);
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden;
  }
  .gift-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent); transition: left 0.5s; }
  .gift-btn:hover::before { left: 100%; }
  .gift-btn:hover { transform: translateY(-6px); box-shadow: var(--shadow); border-color: var(--accent-1); }
  .gift-btn:active { transform: translateY(-2px) scale(0.97); }
  .gift-btn .gift-icon { font-size: 2.2rem; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3)); }
  .gift-btn .gift-name { font-size: 0.95rem; font-weight: 600; }
  .gift-btn .gift-sub { font-size: 0.75rem; color: var(--text-muted); font-weight: 300; }

  footer { text-align: center; padding: 40px 20px; position: relative; z-index: 1; color: var(--text-muted); font-size: 0.9rem; font-weight: 300; }
  footer .heart { color: var(--accent-2); font-size: 1.1rem; }

  .modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10, 8, 30, 0.85); backdrop-filter: blur(8px); z-index: 200;
    display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease; padding: 20px;
  }
  .modal-overlay.active { opacity: 1; pointer-events: auto; }
  .modal-card {
    background: linear-gradient(135deg, rgba(108, 92, 231, 0.12), rgba(253, 121, 168, 0.08));
    border: 1px solid var(--card-border); border-radius: 24px; padding: 45px 40px;
    max-width: 580px; width: 100%; max-height: 85vh; overflow-y: auto; backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); transform: scale(0.85) translateY(30px);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative;
  }
  .modal-overlay.active .modal-card { transform: scale(1) translateY(0); }
  .modal-close {
    position: absolute; top: 16px; right: 16px; width: 38px; height: 38px; border-radius: 50%;
    background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text); font-size: 1.1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.25s ease; z-index: 10;
  }
  .modal-close:hover { background: var(--accent-2); border-color: var(--accent-2); transform: rotate(90deg); }
  .modal-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
  .modal-icon { font-size: 2.8rem; filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3)); }
  .modal-title {
    font-size: 1.6rem; font-weight: 700;
    background: linear-gradient(90deg, var(--accent-2), var(--accent-3));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.2;
  }
  .modal-body { font-size: 1.08rem; line-height: 1.85; color: var(--text-muted); font-weight: 300; }
  .modal-body strong { color: var(--text); font-weight: 600; }
  .modal-signature { margin-top: 28px; text-align: right; font-size: 0.95rem; color: var(--accent-4); font-weight: 500; font-style: italic; }
  .modal-divider { width: 60px; height: 3px; border-radius: 2px; background: linear-gradient(90deg, var(--accent-2), var(--accent-3)); margin: 0 auto 24px; }
  .modal-card::-webkit-scrollbar { width: 6px; }
  .modal-card::-webkit-scrollbar-track { background: transparent; }
  .modal-card::-webkit-scrollbar-thumb { background: var(--accent-1); border-radius: 3px; }

  /* ===== MUSIC PLAYER ===== */
  .music-btn {
    position: fixed; top: 20px; right: 20px; z-index: 150;
    background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 50%;
    width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; backdrop-filter: blur(10px); transition: all 0.3s ease; color: var(--text); font-size: 1.3rem;
  }
  .music-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--accent-3); }
  .music-btn.playing { box-shadow: 0 0 15px var(--accent-3); }
  .music-btn .pulse { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--accent-3); opacity: 0; animation: none; }
  .music-btn.playing .pulse { animation: pulseRing 1.5s ease-out infinite; }
  @keyframes pulseRing { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.5); opacity: 0; } }

  .music-panel {
    position: fixed; top: 80px; right: 20px; z-index: 150;
    background: linear-gradient(135deg, rgba(15, 12, 41, 0.95), rgba(48, 43, 99, 0.95));
    border: 1px solid var(--card-border); border-radius: 14px; padding: 14px;
    width: 260px; max-width: calc(100vw - 40px); backdrop-filter: blur(20px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5); opacity: 0; transform: translateY(-10px) scale(0.95);
    pointer-events: none; transition: all 0.3s ease;
  }
  .music-panel.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
  .music-panel h3 { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

  #songList {
    max-height: 200px; overflow-y: auto; padding-right: 4px;
    scrollbar-width: thin; scrollbar-color: var(--accent-1) transparent;
  }
  #songList::-webkit-scrollbar { width: 4px; }
  #songList::-webkit-scrollbar-track { background: transparent; }
  #songList::-webkit-scrollbar-thumb { background: var(--accent-1); border-radius: 2px; }
  .song-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px;
    cursor: pointer; transition: all 0.2s ease; margin-bottom: 6px;
    background: rgba(255,255,255,0.04); border: 1px solid transparent;
  }
  .song-item:hover { background: rgba(108, 92, 231, 0.15); border-color: var(--accent-1); }
  .song-item.active { background: linear-gradient(90deg, rgba(108, 92, 231, 0.25), rgba(253, 121, 168, 0.15)); border-color: var(--accent-2); }
  .song-item .song-icon { font-size: 1.1rem; }
  .song-item .song-info { flex: 1; min-width: 0; }
  .song-item .song-title { font-size: 0.82rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .song-item .song-artist { font-size: 0.7rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .song-item .song-status { font-size: 0.8rem; color: var(--accent-3); }

  .now-playing-box {
    margin-top: 10px; padding: 10px; border-radius: 10px;
    background: linear-gradient(135deg, rgba(108, 92, 231, 0.12), rgba(0, 206, 201, 0.08));
    border: 1px solid rgba(0, 206, 201, 0.15); text-align: center;
  }
  .now-playing-box .np-label { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 3px; }
  .now-playing-box .np-title { font-size: 0.82rem; font-weight: 600; color: var(--text); margin-bottom: 1px; }
  .now-playing-box .np-artist { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 10px; }

  .player-controls { display: flex; align-items: center; justify-content: center; gap: 8px; }
  .ctrl-btn {
    width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--card-border);
    background: var(--card-bg); color: var(--text); cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: all 0.25s ease; font-size: 0.85rem; font-family: inherit;
  }
  .ctrl-btn:hover { background: var(--accent-1); border-color: var(--accent-1); transform: scale(1.08); }
  .ctrl-btn:active { transform: scale(0.92); }
  .ctrl-btn.play-pause {
    width: 44px; height: 44px; font-size: 1rem;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); border: none;
  }
  .ctrl-btn.play-pause:hover { opacity: 0.9; }

  @media (max-width: 600px) {
    header { padding: 60px 20px 30px; }
    .gifts-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
    .gift-btn { padding: 20px 12px; }
    .gift-btn .gift-icon { font-size: 1.8rem; }
    .modal-card { padding: 35px 25px; }
    .modal-title { font-size: 1.3rem; }
    .modal-body { font-size: 1rem; }
    .music-panel { width: 230px; }
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<!-- Music Player Button -->
<div class="music-btn" id="musicBtn" onclick="toggleMusicPanel()">
  <div class="pulse"></div>
  <span id="musicIcon">🎵</span>
</div>

<!-- Music Panel -->
<div class="music-panel" id="musicPanel">
  <h3>🎵 Lista de canciones</h3>
  <div id="songList"></div>

  <div class="now-playing-box" id="nowPlayingBox" style="display:none;">
    <div class="np-label">Reproduciendo</div>
    <div class="np-title" id="npTitle">—</div>
    <div class="np-artist" id="npArtist">—</div>
    <div class="player-controls">
      <button class="ctrl-btn" onclick="prevSong()" title="Anterior">⏮</button>
      <button class="ctrl-btn play-pause" id="playPauseBtn" onclick="togglePlayPause()" title="Play/Pausa">▶</button>
      <button class="ctrl-btn" onclick="nextSong()" title="Siguiente">⏭</button>
    </div>
  </div>
</div>

<header>
  <h1>¡Feliz Día del Amigo! 🎉</h1>
  <p>Para esos amigos del secundario que hicieron que los peores días se volvieran inolvidables. Tocá un regalo y descubrí tu mensaje ✨</p>
</header>

<div class="gifts-section">
  <div class="section-title">🎁 Elegí tu regalo</div>
  <div class="gifts-grid" id="giftsGrid"></div>
</div>

<footer>
  Hecho con <span class="heart">❤</span> para los amigos del secundario — 2026
</footer>

<!-- Hidden audio element -->
<audio id="audioPlayer" preload="auto"></audio>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-card" id="modalCard">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div class="modal-header">
      <div class="modal-icon" id="modalIcon"></div>
      <div class="modal-title" id="modalTitle"></div>
    </div>
    <div class="modal-divider"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-signature" id="modalSign"></div>
  </div>
</div>

<script>
// ===== DATA =====
const data = [
  { icon: "🎁", name: "Caja de Recuerdos", sub: "Para los momentos únicos",
    title: "Nuestra Caja de Recuerdos",
    body: "Desde aquel primer día de clases cuando nadie se conocía, hasta las últimas semanas donde ya éramos una familia, hemos acumulado recuerdos que no caben en ninguna caja. <strong>Los recreos interminables, las risas en el fondo del aula, los códigos secretos, las travesuras</strong>... Todo eso es nuestro tesoro. Gracias por ser parte de cada uno de esos momentos que jamás voy a olvidar.",
    sign: "Con cariño, tu amigo del secundario" },
  { icon: "🌟", name: "Estrella Guía", sub: "Para los que siempre están",
    title: "La Estrella que Me Guía",
    body: "En los días grises, cuando todo parecía difícil, vos estabas ahí. <strong>Con una palabra, con un chiste, con un simple '¿todo bien?'</strong> que cambiaba todo. No siempre nos damos cuenta de lo importante que es tener a alguien que escucha sin juzgar. Vos sos esa estrella que siempre guía, incluso cuando vos mismo no te das cuenta. Gracias por estar, siempre.",
    sign: "De alguien que te valora más de lo que decís" },
  { icon: "🎤", name: "Karaoke Pack", sub: "Para los que cantan mal",
    title: "Nuestro Karaoke Imaginario",
    body: "Puede que ninguno de los dos cante bien, pero eso nunca nos detuvo. <strong>Cantando en los pasillos, tarareando en clase, inventando letras</strong> que solo nosotros entendíamos. Esas eran las mejores canciones. La música no importa cuando la compañía es la correcta. Gracias por hacer de cada día común una canción que vale la pena recordar.",
    sign: "Tu duo favorito del secundario" },
  { icon: "📚", name: "Libro de Travesuras", sub: "Para las aventuras juntas",
    title: "El Libro de Nuestras Travesuras",
    body: "Si alguien escribiera un libro sobre todo lo que hicimos, sería un bestseller. <strong>Las veces que casi nos descubren, las excusas creativas, las misiones imposibles</strong> que solo dos amigos del secundario podían emprender. Cada capítulo tiene tu nombre. Cada página tiene nuestra risa. Que este libro nunca se cierre.",
    sign: "Tu cómplice favorito" },
  { icon: "🚀", name: "Ticket al Futuro", sub: "Para los que sueñan juntos",
    title: "Un Ticket Para el Futuro",
    body: "El secundario se termina, pero nuestra amistad no. <strong>Este es un ticket para el futuro</strong>, para dentro de cinco, diez o veinte años. Cuando nos encontremos de nuevo, quiero que sigamos riendo de las mismas tonterías, que sigamos recordando los mismos momentos, que sigamos siendo nosotros. Porque los amigos de verdad no se despiden, solo dicen 'hasta pronto'.",
    sign: "Hasta el futuro, tu amigo" },
  { icon: "⚽", name: "Pelota de Recreo", sub: "Para los que nunca fallan",
    title: "La Pelota del Recreo Eterno",
    body: "El recreo era nuestro momento sagrado. <strong>Cuando todo era simple: correr, jugar, gritar gol</strong>. No importaba si ganábamos o perdíamos, importaba que estábamos juntos. Vos siempre pasabas la pelota, siempre confiabas. Esa confianza en la cancha del patio es la misma que tengo en vos en la cancha de la vida. Sos parte de mi equipo, siempre.",
    sign: "Tu compañero de equipo eterno" },
  { icon: "🎈", name: "Globos de Alegría", sub: "Para los que hacen reír",
    title: "Los Globos de Nuestra Alegría",
    body: "Saber reír es un don, y vos lo tenés. <strong>Cuando yo no podía reír, vos encontrabas la forma</strong>. Con una cara, con una palabra, con una historia tan absurda que no había más remedio que reír. Los globos se elevan, las risas se quedan. Y las risas que compartimos son las que más alto llegan. Gracias por llenar mis días de color.",
    sign: "Tu amigo que todavía se ríe con tus chistes" },
  { icon: "🏆", name: "Trofeo de Amistad", sub: "Para los mejores",
    title: "El Trofeo Que Te Merecés",
    body: "Si hubiera un trofeo por ser el mejor amigo, <strong>te lo daría sin pensar</strong>. Por aguantarme, por escucharme, por no irte cuando era fácil irse. Por quedarte cuando otros no lo hacían. Vos te ganaste este trofeo con cada gesto, con cada acto pequeño que otros no ven pero yo sí. Este es tu lugar. Este siempre fue tu lugar.",
    sign: "Tu fan número uno" },
  { icon: "🌈", name: "Arcoíris Mágico", sub: "Para los que traen color",
    title: "Tu Arcoíris Personal",
    body: "Después de la lluvia viene el arcoíris. Y vos siempre fuiste mi arcoíris. <strong>Cuando todo estaba gris, vos aparecías con color</strong>. Con una idea, con un plan, con una sonrisa que no aceptaba un 'no'. Los días difíciles eran más fáciles con vos al lado. Y los días buenos eran increíbles con vos al lado. En realidad, todo es mejor con vos.",
    sign: "Tu amigo que siempre ve tu color" },
];
  

  // ===== Render gift buttons =====
const giftsGrid = document.getElementById('giftsGrid');
data.forEach((item, i) => {
  const btn = document.createElement('button');
  btn.className = 'gift-btn';
  btn.innerHTML = '<div class="gift-icon">' + item.icon + '</div><div class="gift-name">' + item.name + '</div><div class="gift-sub">' + item.sub + '</div>';
  btn.onclick = () => openModal(i);
  giftsGrid.appendChild(btn);
});

// ===== Modal =====
const modalOverlay = document.getElementById('modalOverlay');
function openModal(index) {
  const item = data[index];
  document.getElementById('modalIcon').textContent = item.icon;
  document.getElementById('modalTitle').textContent = item.title;
  document.getElementById('modalBody').innerHTML = item.body;
  document.getElementById('modalSign').textContent = '— ' + item.sign;
  modalOverlay.classList.add('active');
}
function closeModal(event) { if (event.target === modalOverlay) modalOverlay.classList.remove('active'); }
function closeModalBtn() { modalOverlay.classList.remove('active'); }
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModalBtn(); });

// ===== Particles =====
const particlesContainer = document.getElementById('particles');
const colors = ['#6c5ce7', '#fd79a8', '#00cec9', '#fdcb6e', '#a29bfe', '#ff7675'];
for (let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.background = colors[Math.floor(Math.random() * colors.length)];
  p.style.animationDuration = (Math.random() * 15 + 10) + 's';
  p.style.animationDelay = Math.random() * 10 + 's';
  p.style.width = p.style.height = (Math.random() * 6 + 3) + 'px';
  particlesContainer.appendChild(p);
}

// ===== MUSIC PLAYER =====
const audioPlayer = document.getElementById('audioPlayer');
const musicBtn = document.getElementById('musicBtn');
const musicIcon = document.getElementById('musicIcon');
const musicPanel = document.getElementById('musicPanel');
const songList = document.getElementById('songList');
const nowPlayingBox = document.getElementById('nowPlayingBox');
const playPauseBtn = document.getElementById('playPauseBtn');

const songs = [
  { title: 'No me llores', artist: 'Duki', url: 'https://base44.app/api/apps/6a5da972c767fff27b059883/files/mp/public/6a5da972c767fff27b059883/79e69586f_7ed7f88a3_Duki_Leby-NoMeLloresaudiooficialM4A_128K.m4a', icon: '🎤' },
  { title: 'Chernóbil', artist: 'Emanero', url: 'https://base44.app/api/apps/6a5da972c767fff27b059883/files/mp/public/6a5da972c767fff27b059883/7ef0b8c52_464b42203_Emanero-ChernobylVideoOficialM4A_128K.m4a', icon: '☢️' },
  { title: 'Te Acuerdas De Mi', artist: 'Plan B', url: 'https://base44.app/api/apps/6a5da972c767fff27b059883/files/mp/public/6a5da972c767fff27b059883/941bf03b7_468a852c4_PlanB-TeAcuerdasDeMiOfficialVideoM4A_128K.m4a', icon: '🎵' },

let currentSong = -1;
let isPlaying = false;

function toggleMusicPanel() {
  musicPanel.classList.toggle('open');
}

function renderSongs() {
  songList.innerHTML = '';
  songs.forEach((song, i) => {
    const item = document.createElement('div');
    item.className = 'song-item' + (i === currentSong ? ' active' : '');
    item.innerHTML =
      '<div class="song-icon">' + song.icon + '</div>' +
      '<div class="song-info">' +
        '<div class="song-title">' + song.title + '</div>' +
        '<div class="song-artist">' + song.artist + '</div>' +
      '</div>' +
      '<div class="song-status">' + (i === currentSong && isPlaying ? '▶' : '') + '</div>';
    item.onclick = () => playSong(i);
    songList.appendChild(item);
  });
}

// Stop everything cleanly — no audio overlap
function stopAudio() {
  audioPlayer.pause();
  audioPlayer.currentTime = 0;
  audioPlayer.src = '';
}

function playSong(index) {
  // Stop current audio completely before starting new one
  stopAudio();

  currentSong = index;
  const song = songs[index];
  audioPlayer.src = song.url;
  audioPlayer.volume = 0.5;

  audioPlayer.play().then(function() {
    isPlaying = true;
    musicBtn.classList.add('playing');
    musicIcon.textContent = '🎵';
    playPauseBtn.textContent = '⏸';
    nowPlayingBox.style.display = 'block';
    document.getElementById('npTitle').textContent = song.title;
    document.getElementById('npArtist').textContent = song.artist;
    renderSongs();
  }).catch(function(e) {
    console.log('Error:', e);
    isPlaying = false;
  });
}

function togglePlayPause() {
  if (currentSong === -1) {
    // Nothing loaded — start first song
    playSong(0);
    return;
  }

  if (isPlaying) {
    audioPlayer.pause();
    isPlaying = false;
    musicBtn.classList.remove('playing');
    playPauseBtn.textContent = '▶';
  } else {
    audioPlayer.play().then(function() {
      isPlaying = true;
      musicBtn.classList.add('playing');
      playPauseBtn.textContent = '⏸';
    }).catch(function(e) { console.log('Error:', e); });
  }
  renderSongs();
}

function prevSong() {
  if (songs.length === 0) return;
  // Stop current, go to previous (wrap around)
  stopAudio();
  let newIndex = currentSong - 1;
  if (newIndex < 0) newIndex = songs.length - 1;
  playSong(newIndex);
}

function nextSong() {
  if (songs.length === 0) return;
  // Stop current, go to next (wrap around)
  stopAudio();
  let newIndex = currentSong + 1;
  if (newIndex >= songs.length) newIndex = 0;
  playSong(newIndex);
}

// When a song ends, go to next one automatically
audioPlayer.addEventListener('ended', function() {
  nextSong();
});

// Update UI when paused/played
audioPlayer.addEventListener('pause', function() {
  if (!isPlaying) {
    musicBtn.classList.remove('playing');
    playPauseBtn.textContent = '▶';
    renderSongs();
  }
});

audioPlayer.addEventListener('play', function() {
  isPlaying = true;
  musicBtn.classList.add('playing');
  playPauseBtn.textContent = '⏸';
  renderSongs();
});

renderSongs();

// ===== PWA: Service Worker Registration =====
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').then(function(reg) {
      console.log('PWA: Service Worker registrado OK');
    }).catch(function(e) {
      console.log('PWA: No se pudo registrar el Service Worker', e);
    });
  });
}

// ===== PWA: Install prompt =====
let deferredPrompt;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  // Show install button after 3 seconds
  setTimeout(function() {
    if (deferredPrompt) {
      showInstallBanner();
    }
  }, 3000);
});

function showInstallBanner() {
  var banner = document.createElement('div');
  banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:300;background:linear-gradient(90deg,#6c5ce7,#fd79a8);color:white;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;font-family:Poppins,sans-serif;box-shadow:0 -4px 20px rgba(0,0,0,0.3);animation:slideUp 0.4s ease;';
  banner.innerHTML = '<div style="font-size:0.9rem;font-weight:500;">📱 Instalá la app en tu celular</div><button id="installBtn" style="background:white;color:#6c5ce7;border:none;border-radius:20px;padding:8px 18px;font-weight:700;font-size:0.85rem;cursor:pointer;font-family:inherit;">Instalar</button>';
  document.body.appendChild(banner);

  document.getElementById('installBtn').addEventListener('click', function() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function() {
        banner.remove();
        deferredPrompt = null;
      });
    }
  });

  // Auto-hide after 15 seconds
  setTimeout(function() { if (banner.parentNode) banner.remove(); }, 15000);
}
</script>
